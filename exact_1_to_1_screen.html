<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Futuristic UI</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;700;800&display=swap" rel="stylesheet">

  <style>

    :root{
      --bg:#020817;
      --bg2:#071327;
      --card:#091425;
      --line:rgba(255,255,255,.08);
      --line2:rgba(0,255,180,.35);
      --text:#ffffff;
      --muted:#93a4bd;
      --green:#00f5a0;
      --greenSoft:rgba(0,245,160,.14);
      --shadow:0 10px 40px rgba(0,0,0,.55);
      --glow:0 0 30px rgba(0,255,170,.35);
    }

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:'Heebo',sans-serif;
    }

    body{
      background:
              radial-gradient(circle at top center,#0b2f63 0%,#051325 35%,#020817 70%);

      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      color:white;
      overflow-x:hidden;
    }

    .app{
      width:430px;
      min-height:932px;
      padding:24px 18px 28px;
      position:relative;
      overflow:hidden;
    }

    .app::before{
      content:'';
      position:absolute;
      inset:0;
      background:
              radial-gradient(circle at 50% 0%, rgba(0,255,200,.08), transparent 35%),
              radial-gradient(circle at 10% 50%, rgba(0,120,255,.12), transparent 35%),
              radial-gradient(circle at 90% 50%, rgba(0,255,170,.08), transparent 30%);
      pointer-events:none;
    }

    /* TOP */

    .topbar{
      display:flex;
      justify-content:space-between;
      align-items:center;
      direction:ltr;
      margin-bottom:28px;
    }

    .left-icons{
      display:flex;
      gap:14px;
      align-items:center;
    }

    .top-btn,
    .profile{
      width:56px;
      height:56px;
      border-radius:18px;
      border:1px solid rgba(255,255,255,.09);
      background:rgba(255,255,255,.03);
      backdrop-filter:blur(16px);
      display:flex;
      align-items:center;
      justify-content:center;
      box-shadow:
              inset 0 1px 0 rgba(255,255,255,.08),
              0 10px 30px rgba(0,0,0,.45);
      position:relative;
    }

    .top-btn svg,
    .profile svg{
      width:26px;
      height:26px;
      stroke:white;
      stroke-width:2;
      fill:none;
      opacity:.95;
    }

    .logo-btn{
      font-size:22px;
      font-weight:800;
      color:white;
    }

    .profile::after{
      content:'';
      position:absolute;
      width:10px;
      height:10px;
      background:var(--green);
      border-radius:50%;
      bottom:7px;
      right:7px;
      box-shadow:0 0 14px var(--green);
    }

    /* TABS */

    .tabs{
      display:grid;
      grid-template-columns:1fr 1fr 1fr;
      gap:14px;
      margin-bottom:28px;
    }

    .tab{
      height:74px;
      border-radius:24px;
      border:1px solid rgba(255,255,255,.08);
      background:rgba(255,255,255,.03);
      display:flex;
      align-items:center;
      justify-content:space-between;
      padding:0 22px;
      position:relative;
      overflow:hidden;
      box-shadow:
              inset 0 1px 0 rgba(255,255,255,.06),
              0 10px 35px rgba(0,0,0,.35);
    }

    .tab span{
      font-size:20px;
      font-weight:700;
      color:white;
    }

    .tab svg{
      width:26px;
      height:26px;
      stroke:white;
      stroke-width:2;
      fill:none;
    }

    .tab.active{
      border-color:rgba(0,255,170,.45);
      box-shadow:
              0 0 30px rgba(0,255,170,.18),
              inset 0 0 20px rgba(0,255,170,.08);
    }

    .tab.active::before{
      content:'';
      position:absolute;
      left:0;
      right:0;
      bottom:-1px;
      height:2px;
      background:linear-gradient(90deg,transparent,var(--green),transparent);
      box-shadow:0 0 14px var(--green);
    }

    /* MAIN CARD */

    .card{
      position:relative;
      border-radius:34px;
      border:1px solid rgba(255,255,255,.08);
      min-height:500px;
      background:
              linear-gradient(180deg,rgba(255,255,255,.03),rgba(255,255,255,.015));

      box-shadow:
              inset 0 1px 0 rgba(255,255,255,.05),
              0 30px 60px rgba(0,0,0,.45);

      overflow:hidden;
      padding:54px 28px 34px;
      text-align:center;
    }

    .card::before{
      content:'';
      position:absolute;
      inset:0;
      background-image:radial-gradient(rgba(255,255,255,.08) 1px,transparent 1px);
      background-size:12px 12px;
      opacity:.06;
      mask-image:linear-gradient(to bottom,transparent,white 45%);
    }

    .orb-wrap{
      position:relative;
      width:170px;
      height:170px;
      margin:0 auto 24px;
      display:flex;
      align-items:center;
      justify-content:center;
    }

    .orb-ring1,
    .orb-ring2{
      position:absolute;
      border-radius:50%;
      border:1px solid rgba(0,255,170,.18);
    }

    .orb-ring1{
      width:170px;
      height:170px;
    }

    .orb-ring2{
      width:128px;
      height:128px;
    }

    .orb{
      width:96px;
      height:96px;
      border-radius:50%;
      display:flex;
      align-items:center;
      justify-content:center;
      color:var(--green);
      background:rgba(0,255,170,.05);
      box-shadow:
              inset 0 0 25px rgba(0,255,170,.08),
              0 0 40px rgba(0,255,170,.12);
    }

    .orb svg{
      width:54px;
      height:54px;
      stroke:var(--green);
      stroke-width:2;
      fill:none;
    }

    .stars{
      position:absolute;
      right:26px;
      top:16px;
      color:#ffc84a;
      font-size:28px;
      text-shadow:0 0 14px rgba(255,200,0,.4);
    }

    .badge{
      width:max-content;
      margin:0 auto 28px;
      height:46px;
      border-radius:999px;
      padding:0 18px;
      border:1px solid rgba(255,255,255,.08);
      background:rgba(0,0,0,.18);
      display:flex;
      align-items:center;
      gap:10px;
      color:#d8dfeb;
      font-size:20px;
      position:relative;
      z-index:2;
    }

    .badge .lock{
      color:var(--green);
      filter:drop-shadow(0 0 8px rgba(0,255,170,.5));
    }

    .title{
      font-size:54px;
      font-weight:800;
      line-height:1;
      margin-bottom:22px;
      position:relative;
      z-index:2;
    }

    .subtitle{
      font-size:22px;
      color:#b4c0d2;
      line-height:1.8;
      position:relative;
      z-index:2;
    }

    /* INPUT */

    .composer{
      margin-top:24px;
      height:88px;
      border-radius:28px;
      border:1px solid rgba(255,255,255,.08);
      background:rgba(255,255,255,.03);
      display:flex;
      align-items:center;
      gap:14px;
      padding:14px;
      box-shadow:
              inset 0 1px 0 rgba(255,255,255,.04),
              0 20px 40px rgba(0,0,0,.35);
    }

    .send-btn,
    .emoji-btn{
      width:58px;
      height:58px;
      border-radius:22px;
      display:flex;
      align-items:center;
      justify-content:center;
      border:1px solid rgba(255,255,255,.08);
      background:rgba(255,255,255,.03);
      flex-shrink:0;
    }

    .send-btn{
      background:rgba(0,255,170,.08);
      box-shadow:0 0 24px rgba(0,255,170,.18);
    }

    .send-btn svg,
    .emoji-btn svg{
      width:28px;
      height:28px;
      stroke:white;
      stroke-width:2;
      fill:none;
    }

    .send-btn svg{
      stroke:var(--green);
    }

    .input{
      flex:1;
      height:58px;
      border-radius:22px;
      border:1px solid rgba(255,255,255,.08);
      background:rgba(255,255,255,.02);
      display:flex;
      align-items:center;
      padding:0 22px;
      color:#8fa0ba;
      font-size:24px;
    }

    /* NAV */

    .bottom-nav{
      margin-top:26px;
      display:flex;
      justify-content:space-between;
      gap:14px;
    }

    .nav-card{
      width:88px;
      height:88px;
      border-radius:24px;
      border:1px solid rgba(255,255,255,.08);
      background:rgba(255,255,255,.03);
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      gap:8px;
      box-shadow:
              inset 0 1px 0 rgba(255,255,255,.04),
              0 14px 30px rgba(0,0,0,.3);
    }

    .nav-card.active{
      border-color:rgba(0,255,170,.45);
      box-shadow:
              0 0 30px rgba(0,255,170,.15),
              inset 0 0 20px rgba(0,255,170,.08);
    }

    .nav-card svg{
      width:28px;
      height:28px;
      stroke:white;
      stroke-width:2;
      fill:none;
    }

    .nav-card.active svg,
    .nav-card.active span,
    .nav-card.account svg{
      stroke:var(--green);
      color:var(--green);
    }

    .nav-card span{
      font-size:15px;
      color:white;
      text-align:center;
      line-height:1.1;
      font-weight:600;
    }

    .nav-card.account span{
      color:white;
    }

    /* FOOTER */

    .footer{
      margin-top:28px;
      display:flex;
      justify-content:center;
      flex-wrap:wrap;
      gap:10px;
    }

    .pill{
      height:34px;
      padding:0 16px;
      border-radius:999px;
      border:1px solid rgba(255,255,255,.08);
      background:rgba(255,255,255,.03);
      display:flex;
      align-items:center;
      gap:8px;
      color:#d4dceb;
      font-size:15px;
      box-shadow:
              inset 0 1px 0 rgba(255,255,255,.04),
              0 10px 20px rgba(0,0,0,.25);
    }

    .dot{
      width:8px;
      height:8px;
      border-radius:50%;
      background:var(--green);
      box-shadow:0 0 12px var(--green);
    }

  </style>
</head>
<body>

<div class="app">

  <!-- TOP -->

  <div class="topbar">

    <div class="left-icons">

      <div class="top-btn logo-btn">אב</div>

      <div class="top-btn">
        <svg viewBox="0 0 24 24">
          <path d="M21 12.79A9 9 0 1 1 11.21 3c0 .28 0 .57.02.85A7 7 0 0 0 20.15 12c.29 0 .57-.01.85-.03z"/>
        </svg>
      </div>

      <div class="top-btn">
        <svg viewBox="0 0 24 24">
          <path d="M15 17h5l-1.4-1.4A2 2 0 0 1 18 14.2V11a6 6 0 1 0-12 0v3.2c0 .5-.2 1-.6 1.4L4 17h5"/>
          <path d="M10 17a2 2 0 0 0 4 0"/>
        </svg>
      </div>

      <div class="top-btn">
        <svg viewBox="0 0 24 24">
          <circle cx="11" cy="11" r="7"></circle>
          <path d="m21 21-4.3-4.3"></path>
        </svg>
      </div>

    </div>

    <div class="profile">
      👻
    </div>

  </div>

  <!-- TABS -->

  <div class="tabs">

    <div class="tab">
      <svg viewBox="0 0 24 24">
        <path d="M22 16.92V19a2 2 0 0 1-2.18 2 19.8 19.8 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6A19.8 19.8 0 0 1 2.12 3.18 2 2 0 0 1 4.11 1h2.09a2 2 0 0 1 2 1.72c.12.9.33 1.78.61 2.62a2 2 0 0 1-.45 2.11L7.1 8.91a16 16 0 0 0 8 8l1.46-1.26a2 2 0 0 1 2.11-.45c.84.28 1.72.49 2.62.61A2 2 0 0 1 22 16.92z"/>
      </svg>
      <span>שיחות</span>
    </div>

    <div class="tab active">
      <svg viewBox="0 0 24 24">
        <path d="M5 12.55a11 11 0 0 1 14.08 0"/>
        <path d="M1.42 9a16 16 0 0 1 21.16 0"/>
        <path d="M8.53 16.11a6 6 0 0 1 6.95 0"/>
        <line x1="12" y1="20" x2="12.01" y2="20"/>
      </svg>
      <span>צ'אט</span>
    </div>

    <div class="tab">
      <svg viewBox="0 0 24 24">
        <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
        <circle cx="9" cy="7" r="4"/>
        <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
        <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
      </svg>
      <span>ערוץ</span>
    </div>

  </div>

  <!-- CARD -->

  <div class="card">

    <div class="orb-wrap">
      <div class="orb-ring1"></div>
      <div class="orb-ring2"></div>

      <div class="orb">
        <svg viewBox="0 0 24 24">
          <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
        </svg>
      </div>

      <div class="stars">✦</div>
    </div>

    <div class="badge">
      <span class="lock">🔒</span>
      סיכום מוצפן
    </div>

    <div class="title">אין עדיין הודעות</div>

    <div class="subtitle">
      התחל את השיחה או בקש ניתוח מצלמה חדש מהערוץ הזה.
    </div>

  </div>

  <!-- INPUT -->

  <div class="composer">

    <div class="emoji-btn">
      <svg viewBox="0 0 24 24">
        <circle cx="12" cy="12" r="10"></circle>
        <path d="M8 15s1.5 2 4 2 4-2 4-2"></path>
        <line x1="9" y1="9" x2="9.01" y2="9"></line>
        <line x1="15" y1="9" x2="15.01" y2="9"></line>
      </svg>
    </div>

    <div class="input">...הקלד הודעה</div>

    <div class="send-btn">
      <svg viewBox="0 0 24 24">
        <line x1="22" y1="2" x2="11" y2="13"></line>
        <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
      </svg>
    </div>

  </div>

  <!-- BOTTOM NAV -->

  <div class="bottom-nav">

    <div class="nav-card active">
      <svg viewBox="0 0 24 24">
        <path d="M3 10.5 12 3l9 7.5"></path>
        <path d="M5 9.5V20h14V9.5"></path>
        <path d="M9 20v-6h6v6"></path>
      </svg>
      <span>נוסט<br>לייב</span>
    </div>

    <div class="nav-card">
      <svg viewBox="0 0 24 24">
        <rect x="3" y="3" width="18" height="18" rx="2"></rect>
        <path d="M9 9h.01"></path>
        <path d="M15 9h.01"></path>
        <path d="M9 15h.01"></path>
        <path d="M15 15h.01"></path>
      </svg>
      <span>ערוצים</span>
    </div>

    <div class="nav-card">
      <svg viewBox="0 0 24 24">
        <path d="M15 17h5l-1.4-1.4A2 2 0 0 1 18 14.2V11a6 6 0 1 0-12 0v3.2c0 .5-.2 1-.6 1.4L4 17h5"/>
        <path d="M10 17a2 2 0 0 0 4 0"/>
      </svg>
      <span>התראות</span>
    </div>

    <div class="nav-card account">
      <svg viewBox="0 0 24 24">
        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
        <circle cx="12" cy="7" r="4"></circle>
      </svg>
      <span>חשבון</span>
    </div>

  </div>

  <!-- FOOTER -->

  <div class="footer">

    <div class="pill">גרסה v0.8.3</div>

    <div class="pill">בילד 2026.03</div>

    <div class="pill">
      <div class="dot"></div>
      מערכת OK
    </div>

    <div class="pill">11:21:15 שעה</div>

    <div class="pill">עזרה</div>

    <div class="pill">פרטיות</div>

  </div>

</div>

</body>
</html>
