<!DOCTYPE html>
<!-- saved from url=(0115)file:///Users/alexandr.bogdanov/Downloads/iPhone%2017%20Pro%20Light%20UI%20%E2%80%94%20402%20%C3%97%20873%20pt.html -->
<html lang="he" dir="rtl"><head><meta http-equiv="Content-Type" content="text/html; charset=UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>iPhone 17 Pro Light UI — 402 × 873 pt</title>
<style>
:root{
  --w:402px;
  --h:873px;

  --bg:#fbfcfe;
  --panel:#ffffff;
  --panel-soft:rgba(255,255,255,.80);
  --ink:#121826;
  --muted:#6f7785;
  --line:#e4e9f0;
  --line-2:#d9e0e8;
  --green:#14c982;
  --green-2:#20dea0;
  --green-soft:#ecfff7;

  --shadow:0 12px 28px rgba(18,30,54,.08),0 2px 8px rgba(18,30,54,.045);
  --shadow-soft:0 7px 18px rgba(18,30,54,.055);
}

*{box-sizing:border-box;}
html,body{
  margin:0;
  min-height:100%;
  background:#eef2f7;
  font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","SF Pro Text",Arial,sans-serif;
  color:var(--ink);
}
body{
  min-height:100vh;
  display:grid;
  place-items:center;
  padding:20px;
}
button{
  border:0;
  padding:0;
  background:none;
  font:inherit;
  /* color:inherit; */
}
.phone{
  width:var(--w);
  height:var(--h);
  position:relative;
  overflow:hidden;
  background:
    radial-gradient(circle at 50% -5%,#fff 0 35%,rgba(255,255,255,.94) 52%,#f8fafc 100%);
  box-shadow:0 24px 70px rgba(15,23,42,.16);
  isolation:isolate;
}

/* subtle background haze */
.phone:before{
  content:"";
  position:absolute;
  inset:0;
  pointer-events:none;
  background:
    radial-gradient(circle at -8% 38%,rgba(226,232,240,.42),transparent 28%),
    radial-gradient(circle at 108% 35%,rgba(226,232,240,.36),transparent 30%),
    linear-gradient(180deg,rgba(255,255,255,.15),rgba(241,245,249,.16));
}

/* top safe area for iPhone-like screens */
.top{
  position:absolute;
  left:14px;
  right:14px;
  top: 10px;
  height:43px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  direction:ltr;
  /* box-shadow: 0px 3px 9px 0px #29574429; */
  /* box-sizing: content-box; */
  /* background-color: aliceblue; */
}
.left-tools{
  display:flex;
  align-items:center;
  gap:6px;
  /* direction:ltr; */
}
.lang{
  width:47px;
  height:40px;
  border-radius:12px;
  border:1px solid var(--line);
  background:linear-gradient(180deg,#fff,#fbfcfe);
  box-shadow: 0px 3px 9px 0px #29574429;
  display:grid;
  place-items:center;
  font-size:15px;
  /* font-weight:750; */
  letter-spacing:-.4px;
}
.sep{
  width:1px;
  height:27px;
  background:#e3e8ef;
  margin:0 5px;
}
.round{
  width:37px;
  height:37px;
  border-radius:50%;
  border:1px solid var(--line);
  background:linear-gradient(180deg,#fff,#fbfcfe);
  box-shadow: 0px 3px 9px 0px #29574429;
  display:grid;
  place-items:center;
}
.avatar{
  width:43px;
  height:43px;
  border-radius:13px;
  border:1px solid var(--line);
  background:linear-gradient(180deg,#fff,#fbfcfe);
  box-shadow: 0px 1px 9px 0px #0ab06c99;
  display:grid;
  place-items:center;
  position:relative;
}
.avatar-core{
  width:26px;
  height:26px;
  border-radius:50%;
  background:#070816;
  display:grid;
  place-items:center;
}
.status{
  position:absolute;
  right:2px;
  bottom:3px;
  width:8px;
  height:8px;
  border-radius:50%;
  background:var(--green);
  box-shadow:0 0 0 2.5px #fff;
}

/* tabs */
.main-tabs{
  position:absolute;
  left:14px;
  right:14px;
  top: 80px;
  height:47px;
  display:grid;
  grid-template-columns:1fr 1.03fr 1fr;
  gap:11px;
  direction:ltr;
  /* background: aliceblue; */
  /* background-size: cover; */
}

nav.main-tabs {}
.tab{
  border:1px solid var(--line-2);
  border-radius:14px;
  background:rgba(255,255,255,.78);
  box-shadow: 0px 3px 9px 0px #29574429;
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding: 0 25px;
  font-size:15px;
  /* font-weight:780; */
  letter-spacing:-.45px;
  color:#202938;
  direction:rtl;
}
.tab.active{
  border-color:#65e5b9;
  background:rgba(255,255,255,.88);
  box-shadow: 0px 8px 20px 0px rgba(18, 201, 129, .11), 0px 3px 7px 0px rgb(18 201 129 / 31%);
}

/* central card */
.card{
  position:absolute;
  left:17px;
  right:17px;
  top: 140px;
  height: 530px;
  border-radius:22px;
  background:linear-gradient(180deg,rgba(255,255,255,.93),rgba(255,255,255,.78));
  border: 1px solid #ecfff7;
  box-shadow:var(--shadow);
  overflow:hidden;
  text-align:center;
}
.card:after{
  content:"";
  position:absolute;
  left:0;
  right:0;
  bottom:0;
  height:170px;
  opacity:.38;
  background-image:radial-gradient(#cbd5e1 .55px,transparent .55px);
  background-size:6px 6px;
  mask-image:linear-gradient(transparent,#000 18%,#000);
}
.orbit{
  position:absolute;
  top:45px;
  left:50%;
  transform:translateX(-50%);
  width:126px;
  height:126px;
}
.orbit:before,
.orbit:after{
  content:"";
  position:absolute;
  border-radius:50%;
  border:1px solid rgba(20,201,137,.2);
}
.orbit:before{inset:0}
.orbit:after{inset:18px;border-color:rgba(20,201,137,.28)}
.chat-bubble{
  position:absolute;
  inset:41px;
  display:grid;
  place-items:center;
  color:var(--green);
  filter:drop-shadow(0 4px 8px rgba(18,201,129,.18));
}
.spark{
  position:absolute;
  background:#ffc529;
  transform:rotate(45deg);
  border-radius:1px;
}
.spark:before,.spark:after{
  content:"";
  position:absolute;
  inset:0;
  background:inherit;
  border-radius:inherit;
}
.spark:before{transform:rotate(45deg) scale(.55)}
.spark:after{transform:rotate(-45deg) scale(.55)}
.s1{right:19px;top:30px;width:12px;height:12px;background:#10c981}
.s2{right:6px;top:39px;width:13px;height:13px}
.s3{right:31px;top:22px;width:8px;height:8px}
.s4{right:21px;top:18px;width:9px;height:9px;background:#10c981}
.s5{right:9px;top:58px;width:4px;height:4px;background:#f04438}

.badge{
  position:absolute;
  top:190px;
  left:50%;
  transform:translateX(-50%);
  height:31px;
  min-width:124px;
  border:1px solid #e0e5ec;
  border-radius:999px;
  background:rgba(255,255,255,.74);
  box-shadow:inset 0 1px 0 #fff,0 6px 12px rgba(15,23,42,.035);
  display:flex;
  align-items:center;
  justify-content:center;
  gap:8px;
  font-size:13.5px;
  color:#4b5563;
  z-index:2;
}
.badge .lock{color:var(--green)}
.title{
  position:absolute;
  top:249px;
  left:0;
  right:0;
  margin:0;
  font-size:23px;
  font-weight:850;
  letter-spacing:-.8px;
  z-index:2;
}
.subtitle{
  position:absolute;
  top:296px;
  left:35px;
  right:35px;
  margin:0;
  font-size:14px;
  line-height:1.55;
  color:#3f4754;
  z-index:2;
}

/* composer */
.composer{
  position:absolute;
  left:17px;
  right:17px;
  top: 680px;
  height:67px;
  border-radius:18px;
  background:rgba(255,255,255,.80);
  border:1px solid #e7ebf1;
  box-shadow:var(--shadow);
  display:flex;
  align-items:center;
  gap:11px;
  padding:0 9px;
  direction:ltr;
}
.send{
  width:44px;
  height:44px;
  border-radius:50%;
  border:1px solid #c7f5e2;
  background:#f1fff9;
  color:var(--green);
  display:grid;
  place-items:center;
  box-shadow:0 7px 16px rgba(18,201,129,.08);
}
.input{
  flex:1;
  height:46px;
  border-radius: 10px;
  border:1px solid #e1e6ed;
  background:rgba(255,255,255,.74);
  display:flex;
  align-items:center;
  justify-content:flex-start;
  padding-left: 200px;
  color:#8a93a3;
  font-size:14px;
  direction:rtl;
}
.emoji{
  width:42px;
  height:42px;
  border-radius:50%;
  border:1px solid #e0e5ec;
  background:rgba(255,255,255,.72);
  display:grid;
  place-items:center;
  color:#111827;
}

/* bottom nav */
.bottom-nav{
  position:absolute;
  left:19px;
  right:19px;
  top: 765px;
  height:78px;
  display:grid;
  grid-template-columns: 1fr 1fr 1fr 1fr;
  gap:11px;
  direction:ltr;
  align-content: stretch;
  justify-content: space-evenly;
  align-items: stretch;
  justify-items: stretch;
}
.nav{
  border: 1px solid #20dea054;
  border-radius:15px;
  background:rgba(255,255,255,.80);
  box-shadow:var(--shadow-soft);
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap: 0px;
  font-size: 10px;
  color:#202938;
  direction:rtl;
  height: 55px;
}
.nav svg{width:22px;height:22px}
.nav.active{
  color:var(--green);
  border-color:#66e9bb;
  background:#f2fff9;
  box-shadow:
    0 8px 18px rgba(18,201,129,.10),
    inset 0 0 0 1px rgba(18,201,129,.16);
  font-weight:800;
}

/* footer */
.footer{
  position:absolute;
  left:14px;
  right:14px;
  bottom:18px;
  height:28px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:4px;
  direction:ltr;
  /* width: stretch; */
  /* background-color: aqua; */
}
.pill{
  height:23px;
  padding:0 7px;
  border-radius:999px;
  border:1px solid #e1e6ed;
  background:rgba(255,255,255,.74);
  box-shadow:0 4px 9px rgba(15,23,42,.035);
  display:flex;
  align-items:center;
  justify-content:center;
  gap:4px;
  font-size:10.5px;
  color:#2f3745;
  white-space:nowrap;
  direction:rtl;
}
.dot{
  width:6px;
  height:6px;
  border-radius:50%;
  background:var(--green);
}

svg{
  display:block;
  stroke: #157a52;
  fill:none;
  /* stroke-width:2.25; */
  stroke-linecap:round;
  stroke-linejoin:round;
}
.fill-green{
  fill:var(--green);
  stroke:var(--green);
}
.ghost-body{
  fill:white;
  stroke:white;
}

/* browser preview scaling for small screens */
@media(max-width:430px){
  body{padding:0;background:#fff}
  .phone{
    width:100vw;
    height:calc(100vw * 873 / 402);
    max-height:100vh;
    max-width:calc(100vh * 402 / 873);
  }
}
</style>
</head>
<body>
<main class="phone" aria-label="iPhone 17 Pro coded light app screen">

  <header class="top">
    <div class="left-tools">
      <button class="lang" aria-label="language">אב</button>
      <div class="sep"></div>

      <button class="round" aria-label="theme">
        <svg width="20" height="20" viewBox="0 0 24 24"><path d="M21 13.4A8.7 8.7 0 0 1 10.6 3a7 7 0 1 0 10.4 10.4Z"></path></svg>
      </button>

      <button class="round" aria-label="notifications">
        <svg width="19" height="19" viewBox="0 0 24 24"><path d="M18 8a6 6 0 1 0-12 0c0 7-3 7-3 9h18c0-2-3-2-3-9Z"></path><path d="M10 21h4"></path></svg>
      </button>

      <button class="round" aria-label="search">
        <svg width="20" height="20" viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"></circle><path d="m21 21-4.3-4.3"></path></svg>
      </button>
    </div>

    <button class="avatar" aria-label="assistant">
      <span class="avatar-core">
        <svg width="18" height="18" viewBox="0 0 24 24">
          <path class="ghost-body" d="M5 20V8a7 7 0 0 1 14 0v12l-2.5-1.8L14 20l-2-1.8L9.5 20 7 18.2 5 20Z"></path>
          <circle cx="9" cy="10" r="1.2" fill="#050816" stroke="none"></circle>
          <circle cx="15" cy="10" r="1.2" fill="#050816" stroke="none"></circle>
        </svg>
      </span>
      <span class="status"></span>
    </button>
  </header>

  <nav class="main-tabs" aria-label="main tabs">
    <button class="tab">
      <span>ערוץ</span>
      <svg width="18" height="18" viewBox="0 0 24 24"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M22 21v-2a4 4 0 0 0-3-3.87"></path><path d="M16 3.13a4 4 0 0 1 0 7.75"></path></svg>
    </button>

    <button class="tab active">
      <span>צ'אט</span>
      <svg width="19" height="19" viewBox="0 0 24 24"><path d="M5 12.6a11 11 0 0 1 14 0"></path><path d="M8.5 16a6 6 0 0 1 7 0"></path><path d="M12 20h.01"></path><path d="M2 8.8a16 16 0 0 1 20 0"></path></svg>
    </button>

    <button class="tab">
      <span>שיחות</span>
      <svg width="19" height="19" viewBox="0 0 24 24"><path d="M22 16.9v3a2 2 0 0 1-2.2 2 19.7 19.7 0 0 1-8.6-3.1 19.4 19.4 0 0 1-6-6A19.7 19.7 0 0 1 2.1 4.2 2 2 0 0 1 4.1 2h3a2 2 0 0 1 2 1.7c.1.9.3 1.8.7 2.6a2 2 0 0 1-.4 2.1L8.1 9.7a16 16 0 0 0 6.2 6.2l1.3-1.3a2 2 0 0 1 2.1-.4c.8.3 1.7.6 2.6.7a2 2 0 0 1 1.7 2Z"></path></svg>
    </button>
  </nav>

  <section class="card" aria-label="empty encrypted chat state">
    <div class="orbit">
      <div class="chat-bubble">
        <svg width="49" height="49" viewBox="0 0 24 24" style="stroke-width:1.8"><path d="M21 11.5a8.4 8.4 0 0 1-8.8 8.4 8.8 8.8 0 0 1-3.8-.9L3 21l1.9-5.1a8.4 8.4 0 1 1 16.1-4.4Z"></path><path d="M8 12h.01M12 12h.01M16 12h.01"></path></svg>
      </div>
      <i class="spark s1"></i><i class="spark s2"></i><i class="spark s3"></i><i class="spark s4"></i><i class="spark s5"></i>
    </div>

    <div class="badge">
      <span>סיכום מוצפן</span>
      <span class="lock">
        <svg width="16" height="16" viewBox="0 0 24 24"><rect x="4" y="10" width="16" height="11" rx="2" fill="currentColor" stroke="currentColor"></rect><path d="M8 10V7a4 4 0 0 1 8 0v3" stroke="#fff"></path><path d="M12 15v2" stroke="#fff"></path></svg>
      </span>
    </div>

    <h1 class="title">אין עדיין הודעות</h1>
    <p class="subtitle">התחל את השיחה או בקש ניתוח מצלמה חדש מהערוץ הזה.</p>
  </section>

  <section class="composer" aria-label="message composer">
    <button class="send" aria-label="send">
      <svg width="22" height="22" viewBox="0 0 24 24"><path d="m22 2-7 20-4-9-9-4 20-7Z"></path><path d="M22 2 11 13"></path></svg>
    </button>

    <div class="input" role="textbox" aria-label="message input">...הקלד הודעה</div>

    
  </section>

  <nav class="bottom-nav" aria-label="bottom navigation">
    <button class="nav">
      <svg viewBox="0 0 24 24"><path class="fill-green" d="M12 12a4 4 0 1 0 0-8 4 4 0 0 0 0 8Z"></path><path d="M4 22a8 8 0 0 1 16 0"></path></svg>
      <span>חשבון</span>
    </button>

    <button class="nav">
      <svg viewBox="0 0 24 24"><path d="M18 8a6 6 0 1 0-12 0c0 7-3 7-3 9h18c0-2-3-2-3-9Z"></path><path d="M10 21h4"></path></svg>
      <span>התראות</span>
    </button>

    <button class="nav">
      <svg viewBox="0 0 24 24"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M22 21v-2a4 4 0 0 0-3-3.87"></path><path d="M16 3.13a4 4 0 0 1 0 7.75"></path></svg>
      <span>ערוצים</span>
    </button>

    <button class="nav active">
      <svg viewBox="0 0 24 24"><path d="m3 11 9-8 9 8"></path><path d="M5 10v10h14V10"></path><path d="M9 16a5 5 0 0 1 6 0"></path><path d="M11 18h2"></path></svg>
      <span>נוטס<br>לייב</span>
    </button>
  </nav>

  <footer class="footer">
    
    
    <span class="pill">11:21:15&nbsp; שעה</span>
    <span class="pill">מערכת OK <i class="dot"></i></span>
    <span class="pill">בילד 2026.03</span>
    <span class="pill">גרסה v0.8.3</span>
  </footer>

</main>

</body></html>
